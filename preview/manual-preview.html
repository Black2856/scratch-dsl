<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>htmlJs2sb3 Manual Preview</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: system-ui, sans-serif;
            background: #15171a;
            color: #edf0f3;
        }
        body {
            margin: 0;
            padding: 24px;
        }
        header, main {
            width: min(1080px, 100%);
            margin: 0 auto;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }
        h1, h2 {
            margin: 0;
        }
        h1 {
            font-size: 22px;
        }
        h2 {
            font-size: 15px;
            margin-bottom: 10px;
        }
        .controls {
            display: flex;
            gap: 8px;
        }
        button {
            border: 0;
            border-radius: 7px;
            padding: 9px 15px;
            font-weight: 700;
            cursor: pointer;
        }
        #green-flag {
            background: #34b66a;
            color: #081b0f;
        }
        #stop {
            background: #e35d6a;
            color: #26070a;
        }
        button:disabled {
            cursor: wait;
            opacity: .55;
        }
        main {
            display: grid;
            grid-template-columns: 500px 1fr;
            gap: 18px;
            align-items: start;
        }
        .panel {
            background: #20242a;
            border: 1px solid #343a43;
            border-radius: 10px;
            padding: 10px;
        }
        .stage-shell {
            width: 480px;
            height: 360px;
            background:
                linear-gradient(45deg, #252a31 25%, transparent 25%),
                linear-gradient(-45deg, #252a31 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #252a31 75%),
                linear-gradient(-45deg, transparent 75%, #252a31 75%),
                #171a1f;
            background-size: 24px 24px;
            background-position: 0 0, 0 12px, 12px -12px, -12px 0;
            border-radius: 5px;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 480px;
            height: 360px;
        }
        .side {
            display: grid;
            gap: 12px;
        }
        dl {
            display: grid;
            grid-template-columns: 145px 1fr;
            gap: 5px 10px;
            margin: 0;
            font-size: 13px;
        }
        dt {
            color: #aeb7c2;
        }
        dd {
            margin: 0;
            overflow-wrap: anywhere;
        }
        #status[data-state="running"] {
            color: #62dc8d;
        }
        #status[data-state="error"] {
            color: #ff7b87;
        }
        #diagnostics {
            display: grid;
            gap: 7px;
            max-height: 300px;
            overflow: auto;
        }
        .diagnostic {
            border-left: 4px solid #8993a0;
            background: #171a1f;
            padding: 8px;
            font-size: 12px;
        }
        .diagnostic.error {
            border-color: #ff6573;
        }
        .diagnostic.warning {
            border-color: #e9b949;
        }
        .diagnostic.info {
            border-color: #5aa9e6;
        }
        .diagnostic code {
            color: #cbd4df;
        }
        .empty {
            color: #9ba5b1;
            font-size: 13px;
        }
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1 id="project-name">Loading workspace project…</h1>
            <div id="project-path"></div>
        </div>
        <div class="controls">
            <button id="green-flag" type="button" disabled>⚑ Green Flag</button>
            <button id="stop" type="button" disabled>■ Stop</button>
        </div>
    </header>
    <main>
        <section class="panel">
            <div class="stage-shell">
                <canvas id="stage" width="480" height="360" tabindex="0"></canvas>
            </div>
        </section>
        <div class="side">
            <section class="panel">
                <h2>Execution state</h2>
                <dl>
                    <dt>Status</dt><dd id="status" data-state="loading">loading</dd>
                    <dt>Threads</dt><dd id="thread-count">0</dd>
                    <dt>Clones</dt><dd id="clone-count">0</dd>
                    <dt>Current blocks</dt><dd id="current-blocks">—</dd>
                    <dt>Assets</dt><dd id="asset-state">loading</dd>
                    <dt>Audio context</dt><dd id="audio-state">not started</dd>
                    <dt>Active sounds</dt><dd id="active-sounds">0</dd>
                    <dt>Frame count</dt><dd id="frame-count">0</dd>
                </dl>
            </section>
            <section class="panel">
                <h2>Diagnostics</h2>
                <div id="diagnostics"><div class="empty">No diagnostics.</div></div>
            </section>
        </div>
    </main>
    <script src="/manual-preview.js"></script>
</body>
</html>
