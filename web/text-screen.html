<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Determination Text Screen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>TEXT SCREEN</h1>
  <p class="subtitle">Scratch には文字表示が無いため、Determination フォントの 1文字=1画像 を
    ブロック定義（writeText）と Pen の stamp で描画するテスト画面</p>

  <!-- 内部解像度 480x360 固定。表示は CSS で拡大 -->
  <canvas id="stage" width="480" height="360"></canvas>

  <div id="controls">
    <button id="btn-draw">▶ 描画（緑の旗）</button>
    <button id="btn-stop">■ 停止</button>
  </div>

  <div id="status">
    <span>描画方式: <b>pen stamp</b></span>
    <span>costumes: <b id="st-costumes">0</b></span>
  </div>

  <p id="hint">DSL: <code>spec/text-screen.dsl.json</code> ／ フォント: <code>resorce/font/determination/determination.ttf</code></p>

  <script type="module" src="text-screen.js"></script>
</body>
</html>
